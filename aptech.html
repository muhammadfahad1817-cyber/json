<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="output"></div>
    <script>
       let output = document.getElementById("output")
        let aptech = {
            "students":[
                {"id":"student12345", "name":"Ali", "age":20},
                {"id":"student45", "name":"Aliyan", "age":21},
                {"id":"student345", "name":"Ahmed", "age":22},
                {"id":"student2345", "name":"Ahsan", "age":23}
            ]
        }
        console.log(aptech.students)

        // Accessing all element via loop
        aptech.students.forEach(student=>{
            // console.log(student.id, student.name, student.age)
            output.innerHTML += `<div style="border: 2px solid black; padding: 10px; margin: 10px;">
                <h3>${student.name}</h3>
                <h3>${student.id}</h3>
                <p>${student.age}</p>
                </div>`
        })

        // accessing single element
        console.log(aptech.students[1].name, aptech.students[1].age )

    </script>
</body>
</html>
